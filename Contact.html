<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>JK Cars | Contact Us</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
        }

        header {
            background-color: #000;
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            margin: 0;
            color: #ffcc00;
        }

        nav a {
            color: white;
            margin-left: 20px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            color: #ffcc00;
        }

        .section {
            padding: 40px;
            max-width: 500px;
            margin: auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .section h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        form input,
        form textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 15px;
        }

        form button {
            width: 100%;
            padding: 12px;
            background-color: #ffcc00;
            border: none;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
        }

        form button:hover {
            background-color: #e6b800;
        }

        .info {
            text-align: center;
            margin-top: 30px;
            color: #444;
        }

        footer {
            background-color: #000;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 40px;
        }
    </style>
</head>

<body>

    <header>
        <h1>JK Cars</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="cars.html">Cars</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <div class="section">
        <h2>Contact JK Cars</h2>

        <form>
            <input type="text" placeholder="Your Name" required>
            <input type="email" placeholder="Your Email" required>
            <input type="text" placeholder="Phone Number" required>
            <textarea rows="4" placeholder="Your Message"></textarea>
            <button type="submit">Send Message</button>
        </form>

        <div class="info">
            <p>📍 Location: Chennai, India</p>
            <p>📞 Phone: +91 98765 43210</p>
            <p>📧 Email: jkcars@gmail.com</p>
        </div>
    </div>

    <footer>
        <p>© 2026 JK Cars | All Rights Reserved</p>
    </footer>

</body>

</html>
